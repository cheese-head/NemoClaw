id: brave
display_name: Brave Search
description: Brave Search API access
category: knowledge
endpoints:
  - host: api.search.brave.com
    port: 443
    protocol: rest
    enforcement: enforce
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
binaries:
  - /usr/local/bin/node
  - /usr/bin/node
  - /usr/bin/curl

id: jira
display_name: Jira
description: Jira and Atlassian Cloud access
category: data
endpoints:
  - host: "*.atlassian.net"
    port: 443
    protocol: rest
    enforcement: enforce
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
  - host: auth.atlassian.com
    port: 443
    protocol: rest
    enforcement: enforce
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
  - host: api.atlassian.com
    port: 443
    protocol: rest
    enforcement: enforce
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
binaries:
  - /usr/local/bin/node

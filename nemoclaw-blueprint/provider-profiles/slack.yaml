id: slack
display_name: Slack
description: Slack API, Socket Mode, and webhooks access
category: messaging
endpoints:
  - host: slack.com
    port: 443
    protocol: rest
    enforcement: enforce
    request_body_credential_rewrite: true
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
  - host: api.slack.com
    port: 443
    protocol: rest
    enforcement: enforce
    request_body_credential_rewrite: true
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
  - host: hooks.slack.com
    port: 443
    protocol: rest
    enforcement: enforce
    request_body_credential_rewrite: true
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
  - host: wss-primary.slack.com
    port: 443
    protocol: websocket
    enforcement: enforce
    websocket_credential_rewrite: true
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: WEBSOCKET_TEXT, path: "/**" }
  - host: wss-backup.slack.com
    port: 443
    protocol: websocket
    enforcement: enforce
    websocket_credential_rewrite: true
    rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: WEBSOCKET_TEXT, path: "/**" }
binaries:
  - /usr/local/bin/node
  - /usr/bin/node

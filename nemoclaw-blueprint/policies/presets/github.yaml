#
# GitHub access preset.
#
# Until #1583 was fixed, github.com / api.github.com plus the git binary
# were silently included in the base sandbox policy, so every sandbox
# could clone, push, and call the GitHub API regardless of what the user
# opted into. Moving the entry into a discoverable preset restores
# least-privilege: a sandbox only gets GitHub if the user explicitly
# selects this preset during `nemoclaw onboard` (or applies it later via
# `openshell policy set`).
#
# The sandbox image now ships the provider tools used by the GitHub provider
# profile, so preset policy should expose the same usable surface. Credential
# injection is still governed by OpenShell provider approval.

preset:
  name: github
  description: "GitHub.com and GitHub API access (gh, git, curl)"

network_policies:
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/local/bin/gh }
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/git }
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/node }

preset:
  name: linear
  description: "Linear project management GraphQL API"


network_policies:
  linear:
    name: linear
    endpoints:
      - host: api.linear.app
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          # Linear is a pure GraphQL API — all reads and writes go through POST /graphql.
          # GET is included for introspection and health checks.
          - allow: { method: GET, path: /graphql }
          # exfil_risk: POST /graphql handles all Linear writes — can create or update issues, projects, and comments with arbitrary content
          - allow: { method: POST, path: /graphql }
    binaries:
      - { path: /usr/local/bin/node }

preset:
  name: pagerduty
  description: "PagerDuty incident and on-call management API"

network_policies:
  pagerduty:
    name: pagerduty
    endpoints:
      - host: api.pagerduty.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: /incidents }
          - allow: { method: GET, path: /incidents/* }
          - allow: { method: GET, path: /services }
          - allow: { method: GET, path: /services/* }
          - allow: { method: GET, path: /oncalls }
          - allow: { method: GET, path: /schedules }
          - allow: { method: GET, path: /schedules/* }
          - allow: { method: GET, path: /alerts }
          - allow: { method: GET, path: /analytics/metrics/incidents }
          - allow: { method: POST, path: /incidents }
            exfil_risk: "POST can create incidents with arbitrary content and trigger notifications to external responders"
          - allow: { method: POST, path: /incidents/*/notes }
            exfil_risk: "POST can write arbitrary notes to incidents visible to all responders"
          - allow: { method: PUT, path: /incidents }
            exfil_risk: "PUT can bulk-update incident content and status"
          - allow: { method: PUT, path: /incidents/* }
            exfil_risk: "PUT can overwrite incident details and escalation targets"
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/python3 }

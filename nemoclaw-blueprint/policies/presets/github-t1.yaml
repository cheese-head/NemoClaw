#
# WHAT REMAINS BLOCKED (OpenShell allowlist — unlisted = denied):
#   All hosts not listed in this policy
#   All RFC1918 / loopback / link-local / CGNAT addresses
#   All binaries not explicitly listed in 'binaries:'
preset:
  name: github-t1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /app
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
landlock:
  compatibility: hard_requirement
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  github:
    name: github
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow:
              method: GET
              path: /notifications
      - host: raw.githubusercontent.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow:
              method: GET
              path: /**
    binaries:
      - path: /usr/local/bin/node
      - path: /usr/bin/git

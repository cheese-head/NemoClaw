preset:
  name: openai
  description: "OpenAI API for chat completions, embeddings, and models"


network_policies:
  openai:
    name: openai
    endpoints:
      - host: api.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: /v1/models }
          - allow: { method: GET, path: /v1/models/* }
          - allow: { method: POST, path: /v1/chat/completions }
            exfil_risk: "POST sends prompt content to OpenAI — prompt injection could exfiltrate context data"
          - allow: { method: POST, path: /v1/completions }
            exfil_risk: "POST sends prompt content to OpenAI — prompt injection could exfiltrate context data"
          - allow: { method: POST, path: /v1/embeddings }
            exfil_risk: "POST sends arbitrary text to OpenAI for embedding — can transmit sensitive data"
          - allow: { method: POST, path: /v1/images/generations }
            exfil_risk: "POST sends prompt text to OpenAI image generation"
          - allow: { method: POST, path: /v1/images/edits }
            exfil_risk: "POST sends image data and prompts to OpenAI"
          - allow: { method: POST, path: /v1/audio/transcriptions }
            exfil_risk: "POST sends audio data to OpenAI for transcription"
          - allow: { method: POST, path: /v1/audio/speech }
            exfil_risk: "POST sends text content to OpenAI for speech synthesis"
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/python3 }

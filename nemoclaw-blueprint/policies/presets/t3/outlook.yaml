preset:
  name: outlook
  description: "Microsoft Outlook and Graph API full access (read, send, edit, and delete emails)"

network_policies:
  outlook_graph:
    name: outlook_graph
    endpoints:
      - host: graph.microsoft.com
        port: 443
        access: full
      - host: login.microsoftonline.com
        port: 443
        access: full
      - host: outlook.office365.com
        port: 443
        access: full
      - host: outlook.office.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }

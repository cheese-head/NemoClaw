preset:
  name: email
  description: "Gmail API for reading and sending email"

network_policies:
  gmail:
    name: gmail
    endpoints:
      - host: oauth2.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: /token }
      - host: gmail.googleapis.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          # exfil_risk: GET exposes email message metadata and content from the inbox
          - allow: { method: GET, path: /gmail/v1/users/*/messages }
          # exfil_risk: GET exposes full email content including attachments
          - allow: { method: GET, path: /gmail/v1/users/*/messages/* }
          # exfil_risk: GET exposes email thread metadata
          - allow: { method: GET, path: /gmail/v1/users/*/threads }
          # exfil_risk: GET exposes full email thread content
          - allow: { method: GET, path: /gmail/v1/users/*/threads/* }
          - allow: { method: GET, path: /gmail/v1/users/*/labels }
          - allow: { method: GET, path: /gmail/v1/users/*/labels/* }
          - allow: { method: GET, path: /gmail/v1/users/*/profile }
          # exfil_risk: POST sends email to any recipient — direct data exfiltration vector
          - allow: { method: POST, path: /gmail/v1/users/*/messages/send }
          - allow: { method: POST, path: /gmail/v1/users/*/messages/modify }
          # exfil_risk: POST creates drafts that can be sent to any recipient
          - allow: { method: POST, path: /gmail/v1/users/*/drafts }
          # exfil_risk: PUT updates drafts that can be sent to any recipient
          - allow: { method: PUT, path: /gmail/v1/users/*/drafts/* }
    binaries:
      - { path: /usr/local/bin/node }
